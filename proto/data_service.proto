syntax = "proto3";

package sync;

import "google/protobuf/timestamp.proto";

option go_package = "syncpb";

service DataSyncService {
  rpc UploadSensor(Sensor) returns (UploadSensorResponse);

  rpc UploadSingleRow(DataRow) returns (UploadCompleteResponse);
}

message DataRow {
  int32 sensor_id = 1;
  string type = 2;
  double value = 3;
  google.protobuf.Timestamp create_at = 4;
}

message UploadCompleteResponse {
  bool success = 1;
  int32 rows_received = 2;
}

message Sensor {
  string name = 3;
  double vbat = 4;
  string status = 5;
}

message UploadSensorResponse {
  bool success = 1;
}