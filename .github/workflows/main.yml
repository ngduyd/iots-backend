name: Python Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy using ssh
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: 22
        script: |
          set -e
          cd /root/iots-backend
          git fetch --prune origin main
          git checkout main
          git reset --hard origin/main

          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q '^iots-backend.service'; then
            systemctl restart iots-backend
            systemctl status iots-backend --no-pager -l | tail -n 20
          else
            PID_FILE=/root/iots-backend/uvicorn.pid
            if [ -f "$PID_FILE" ]; then
              OLD_PID=$(cat "$PID_FILE")
              if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" >/dev/null 2>&1; then
                kill "$OLD_PID"
                sleep 1
              fi
            fi

            PORT_PID=$(ss -ltnp 2>/dev/null | awk '/:8000 / {gsub(/.*pid=|,.*/, "", $NF); print $NF; exit}')
            if [ -n "$PORT_PID" ] && kill -0 "$PORT_PID" >/dev/null 2>&1; then
              echo "Killing process using port 8000 (PID $PORT_PID)"
              kill "$PORT_PID"
              sleep 1
            fi

            nohup .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 > /root/iots-backend/app.log 2>&1 &
            echo $! > "$PID_FILE"
            sleep 2
            NEW_PID=$(cat "$PID_FILE")
            if kill -0 "$NEW_PID" >/dev/null 2>&1; then
              echo "iots-backend started with PID $NEW_PID"
            else
              echo "iots-backend failed to start. Last 100 lines of app.log:"
              tail -n 100 /root/iots-backend/app.log || true
              exit 1
            fi
          fi
            
          