name: Python Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy using ssh
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: 22
        script: |
          set -e
            cd /root/iots-backend

            if systemctl list-unit-files | grep -q '^iots-backend.service'; then
              systemctl stop iots-backend || true
            fi

            fuser -k 8000/tcp || true
            sleep 1

            pkill -f "uvicorn" || true
            sleep 1

            git fetch --prune origin main
            git reset --hard origin/main

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

          . venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          if systemctl list-unit-files | grep -q '^iots-backend.service'; then
            systemctl start iots-backend
            systemctl status iots-backend --no-pager -l | tail -n 20
          else
            nohup venv/bin/uvicorn app.main:app \
              --host 0.0.0.0 \
              --port 8000 \
              > app.log 2>&1 &

            echo $! > uvicorn.pid
            sleep 2

            if kill -0 $(cat uvicorn.pid) >/dev/null 2>&1; then
            else
              tail -n 100 app.log
              exit 1
            fi
          fi
              
            