services:
  mqtt-service:
    container_name: mqtt-service
    image: docker.io/ngduyd/mqtt-service:latest
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-mqtt}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_TOPIC=${MQTT_TOPIC:-sensors/data}
      - MQTT_USERNAME=${MQTT_USERNAME:-user}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-password}
      - DB_HOST=${DB_HOST:-database}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-mydb}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - HTTP_HOST=${HTTP_HOST:-0.0.0.0}
      - HTTP_PORT=${HTTP_PORT:-8000}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin123}
      - SESSION_SECRET=${SESSION_SECRET:-change-me}
      - SESSION_MAX_AGE_SECONDS=${SESSION_MAX_AGE_SECONDS:-3600}
      - SENSOR_OFFLINE_TIMEOUT=${SENSOR_OFFLINE_TIMEOUT:-120}
    depends_on:
      - mqtt
      - database
    restart: always
    ports:
      - "8000:8000"

  mqtt:
    container_name: mqtt
    image: docker.io/eclipse-mosquitto:2.0.22
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
    restart: always

  database:
    container_name: database
    image: docker.io/postgres:latest
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-mydb}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql
    restart: always
    
  ui:
    container_name: ui
    image: docker.io/ngduyd/ui-iot:latest
    volumes:
      - ./config.json:/app/config.json
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-mqtt}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_TOPIC=${MQTT_TOPIC:-sensors/data}
      - MQTT_USERNAME=${MQTT_USERNAME:-user}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-password}
      - DB_HOST=${DB_HOST:-database}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-mydb}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      - mqtt-service
    ports:
      - "3000:8080"
    restart: always

volumes:
  db_data: